parameters:
  arch: 'X64'
  iotHubHostName: ''

steps: 
  - task: AzureCLI@2
    displayName: 'Create identity'
    name: createIdentity
    inputs:
      azureSubscription: 'IoTEdge1-msazure'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail

        echo "Extracting hub name"
        iotHubName=$(echo "${{ parameters.iotHubHostName }}" | sed -n 's/^\([^.]*\).*/\1/p')
        echo "Found Hub name: $iotHubName"

        az config set extension.use_dynamic_install=yes_without_prompt
        deviceId="level_$(level)_${{ parameters.arch }}_$(Build.BuildId)$(upstreamProtocol)"

        echo "Creating device '$deviceId' in IoT hub '$iotHubName'"
        if [ "$LEVEL" = "5" ]; then
            az iot hub device-identity create --auth-type login --device-id $deviceId --hub-name $iotHubName --edge-enabled --output none
        else
            az iot hub device-identity create --auth-type login --device-id $deviceId --hub-name $iotHubName --edge-enabled --output none

            echo "Setting parent device to '$(parentDeviceId)'"
            az iot hub device-identity parent set --auth-type login --device-id $deviceId --hub-name $iotHubName --parent-device-id $(parentDeviceId)
        fi

        connectionString=$(az iot hub device-identity connection-string show --auth-type login --device-id $deviceId --hub-name $iotHubName --query 'connectionString' --output tsv)

        #set output variable to use later in the job
        echo "##vso[task.setvariable variable=connectionString]$connectionString"
        echo "##vso[task.setvariable variable=deviceId]$deviceId"
        echo "##vso[task.setvariable variable=iotHubName]$iotHubName"

        #set output variable outside job
        echo "##vso[task.setvariable variable=connectionString;isOutput=true]$connectionString"
        echo "##vso[task.setvariable variable=parentDeviceId;isOutput=true]$deviceId"
        echo "##vso[task.setvariable variable=iotHubName;isOutput=true]$iotHubName"
