parameters:
  agentName: ''
  nsgName: ''

steps: 
  - task: AzureCLI@2
    condition: always()
    displayName: 'Unlocking network of ${{ parameters.agentName }}'
    inputs:
      azureSubscription: '$(az.subscription)'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az network nsg rule delete \
          --resource-group '$(resourceGroup)' \
          --nsg-name '${{ parameters.nsgName }}' \
          --name 'Lock_network'