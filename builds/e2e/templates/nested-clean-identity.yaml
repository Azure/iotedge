parameters:
  arch: 'x64'
  iotHubName: ''
  deviceId: ''
  lvl: ''

steps:
  - task: AzureCLI@2
    displayName: 'Clean identity level=${{ parameters.lvl }} arch=${{ parameters.arch }}'
    condition: always()
    inputs:
      azureSubscription: '$(az.subscription)'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        if [[ -z "${{ parameters.deviceId }}" || -z "${{ parameters.iotHubName }}" ]]; then
          exit 1
        fi

        echo "Deleting device ${{ parameters.deviceId }} from hub ${{ parameters.iotHubName }}"
        az iot hub device-identity delete --auth-type login --hub-name ${{ parameters.iotHubName }} --device-id ${{ parameters.deviceId }}
