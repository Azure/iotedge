[package]
name = "iotedge"
version = "0.1.0"
authors = ["Azure IoT Edge Devs"]
edition = "2024"
publish = false
description = "The iotedge tool is used to manage the IoT Edge runtime."
homepage = "https://aka.ms/iotedge"
license = "MIT"


[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
atty = { workspace = true }
base64 = { workspace = true }
byte-unit = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
chrono-humanize = { workspace = true }
clap = { workspace = true }
config = { workspace = true }
erased-serde = { workspace = true }
hex = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }
log = { workspace = true }
nix = { workspace = true }
regex = { workspace = true }
semver = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sysinfo = { workspace = true }
tabwriter = { workspace = true }
termcolor = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
toml = { workspace = true }
url = { workspace = true }

aziot-certd-config = { workspace = true }
aziot-identity-client-async = { workspace = true }
aziot-identity-common = { workspace = true }
aziot-identity-common-http = { workspace = true }
aziot-identityd-config = { workspace = true }
aziot-keyd-config = { workspace = true }
aziot-keys-common = { workspace = true }
aziotctl-common = { workspace = true }
cert-renewal = { workspace = true }
http-common = { workspace = true }

docker = { path = "../docker-rs" }
edgelet-core = { path = "../edgelet-core" }
edgelet-http = { path = "../edgelet-http" }
edgelet-settings = { path = "../edgelet-settings", features = ["settings-docker"] }
edgelet-utils = { path = "../edgelet-utils" }
support-bundle = { path = "../support-bundle" }


[features]
snapctl = ["aziotctl-common/snapctl", "support-bundle/snapctl"]
